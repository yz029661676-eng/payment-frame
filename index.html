<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שמירת כרטיס</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
      direction: rtl;
    }

.frame-wrap{
  flex:1;
  min-width:0;
  border:1px solid #d7dde5;
  border-radius:8px;
  background:#fff;
  overflow:hidden;
  height:42px;
}

#NedarimFrame{
  width:100%;
  height:120px;
  border:0;
  display:block;
  transform:translateY(-52px);
}

    #saveBtn {
      height: 46px;
      min-width: 112px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: #cc4b37;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #saveBtn:hover:not(:disabled) {
      filter: brightness(0.96);
    }

    #saveBtn:disabled {
      opacity: 0.78;
      cursor: wait;
    }

    #msg {
      margin-top: 4px;
      min-height: 14px;
      font-size: 11px;
      line-height: 1.2;
      text-align: right;
      color: #666;
    }

    .success {
      color: #16794d;
      font-weight: 700;
    }

    .error {
      color: #b42318;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="frame-wrap">
        <iframe
          id="NedarimFrame"
          src="about:blank"
          scrolling="no"
          title="Credit Card Entry"
        ></iframe>
      </div>

      <button id="saveBtn" type="button">שמור כרטיס</button>
    </div>

    <div id="msg"></div>
  </div>

  <script>
    const MOSAD = "7006117";
    const API_VALID = "/M98yhlNWO";
    const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

    const params = new URLSearchParams(window.location.search);
    const donorId = params.get("donor_id") || "";

    const iframe = document.getElementById("NedarimFrame");
    const saveBtn = document.getElementById("saveBtn");
    const msg = document.getElementById("msg");

    function setMsg(text, type = "") {
      msg.textContent = text || "";
      msg.className = type;
    }

    function resizeParent(height = 58) {
      window.parent.postMessage(
        {
          type: "resize_widget",
          height: height
        },
        "*"
      );
    }

    function postToFrame(data) {
      if (!iframe.contentWindow) return;
      iframe.contentWindow.postMessage(data, "*");
    }

    window.onload = function () {
      resizeParent(58);

      window.addEventListener("message", readPostMessage, false);

      iframe.onload = function () {
        postToFrame({ Name: "GetHeight" });
      };

      iframe.src =
        "https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide&Picture=Hide";

      setTimeout(() => resizeParent(58), 300);
      setTimeout(() => resizeParent(58), 1000);
    };

    async function readPostMessage(event) {
      const data = event.data;
      if (!data || !data.Name) return;

      if (data.Name === "TransactionResponse") {
        const response = data.Value || {};

        if (response.Status === "Error") {
          setMsg(response.Message || "אירעה שגיאה", "error");
          saveBtn.disabled = false;
          saveBtn.textContent = "שמור כרטיס";
          return;
        }

        const token =
          response.Token ||
          response.CardToken ||
          response.CreditToken ||
          response.TransactionToken ||
          "";

        if (!token) {
          console.log("Full response:", response);
          setMsg("לא נמצא טוקן בתגובה", "error");
          saveBtn.disabled = false;
          saveBtn.textContent = "שמור כרטיס";
          return;
        }

        const payload = {
          donor_id: donorId,
          token: token,
          response: response
        };

        try {
          const makeResponse = await fetch(MAKE_WEBHOOK, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!makeResponse.ok) {
            throw new Error("Webhook failed with status " + makeResponse.status);
          }

          setMsg("✓ הכרטיס נשמר", "success");
          saveBtn.textContent = "נשמר";
        } catch (error) {
          console.error(error);
          setMsg("הטוקן נוצר, אבל השליחה ל-Make נכשלה", "error");
          saveBtn.disabled = false;
          saveBtn.textContent = "שמור כרטיס";
        }
      }
    }

    function sendPayment() {
      if (saveBtn.disabled) return;

      saveBtn.disabled = true;
      saveBtn.textContent = "שומר...";
      setMsg("");

      postToFrame({
        Name: "FinishTransaction2",
        Value: {
          Mosad: MOSAD,
          ApiValid: API_VALID,
          PaymentType: "CreateToken",
          Currency: "1",
          Zeout: "",
          FirstName: "",
          LastName: "",
          Street: "",
          City: "",
          Phone: "",
          Mail: "",
          Amount: "1",
          Tashlumim: "1",
          Groupe: "",
          Comment: "Create token",
          Param1: "",
          Param2: "",
          ForceUpdateMatching: "1",
          CallBack: "",
          CallBackMailError: "",
          Tokef: ""
        }
      });
    }

    saveBtn.addEventListener("click", sendPayment);
  </script>
</body>
</html>
