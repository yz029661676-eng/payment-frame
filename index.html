<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Strip</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: Arial, sans-serif; overflow: hidden; }
    
    .container {
      display: flex;
      flex-direction: row-reverse; /* הופך את הסדר כדי שהשדה יהיה מימין והסמלים משמאל */
      align-items: center;
      gap: 12px;
      padding: 5px 10px;
      height: 60px;
      box-sizing: border-box;
    }

    iframe {
      flex: 1; /* לוקח את כל המקום הפנוי */
      min-width: 280px; /* מבטיח שהשדה לא יתכווץ ויהיה מקום למספר ארוך */
      height: 45px !important;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      height: 42px;
      padding: 0 20px;
      font-size: 16px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: #0f766e;
      color: white;
      font-weight: bold;
      white-space: nowrap;
    }

    button:disabled { background: #ccc; }

    .security-icons {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 5px;
    }

    /* שימוש בסמלים של נדרים פלוס שחייבים לעבוד */
    .security-icons img {
      height: 22px;
      width: auto;
      opacity: 0.8;
    }

    #msg {
      position: absolute;
      bottom: 2px;
      right: 20px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe id="NedarimFrame" src="about:blank" scrolling="no"></iframe>

    <button id="saveBtn" type="button">שמור</button>

    <div class="security-icons">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/shield.png" alt="Secure">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/pci.png" alt="PCI">
    </div>
  </div>

  <div id="msg"></div>

<script>
const MOSAD = "7006117";
const API_VALID = "/M98yhlNWO";
const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

const params = new URLSearchParams(window.location.search);
const donorId = params.get("donor_id") || params.get("origami_id");

const iframe = document.getElementById("NedarimFrame");
const saveBtn = document.getElementById("saveBtn");
const msg = document.getElementById("msg");

function setMsg(text, color = "#666") {
  msg.textContent = text || "";
  msg.style.color = color;
}

function postToFrame(data) {
  iframe.contentWindow.postMessage(data, "*");
}

window.onload = function () {
  window.addEventListener("message", receiveMessage, false);

  iframe.onload = function () {
    postToFrame({ Name: "GetHeight" });
  };

  iframe.src = "https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide";
  
  // עדכון גובה הווידג'ט באוריגמי
  setTimeout(() => {
    window.parent.postMessage({ type: "resize_widget", height: 75 }, "*");
  }, 500);
};

async function receiveMessage(event) {
  const data = event.data;
  if (!data || !data.Name) return;

  if (data.Name === "Height") {
    // מונע מהאיפרם לקפוץ גבהים
    return;
  }

  if (data.Name === "TransactionResponse") {
    try {
      const res = data.Value;
      if (res.Status === "Error") {
        setMsg(res.Message || "שגיאה בפרטים", "red");
        saveBtn.disabled = false;
        return;
      }

      const token = res.Token || res.CardToken || res.CreditToken || "";

      const makeResponse = await fetch(MAKE_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          donor_id: donorId,
          token: token,
          response: res
        })
      });

      if (!makeResponse.ok) throw new Error("Make failed");
      setMsg("✅ נשמר בהצלחה", "green");
    } catch (err) {
      setMsg("❌ השליחה נכשלה", "red");
    } finally {
      saveBtn.disabled = false;
    }
  }
}

function sendPayment() {
  setMsg("⌛ מעבד...", "#0f766e");
  saveBtn.disabled = true;

  postToFrame({
    Name: "FinishTransaction2",
    Value: {
      Mosad: MOSAD,
      ApiValid: API_VALID,
      PaymentType: "CreateToken",
      Currency: "1",
      Amount: "1",
      Tashlumim: "1",
      Comment: "Create token",
      ForceUpdateMatching: "1",
      Tokef: ""
    }
  });
}

saveBtn.addEventListener("click", sendPayment);
</script>
</body>
</html>
