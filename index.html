<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Frame</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}

#NedarimFrame{
  flex:1;
  height:42px;
  border:1px solid #ccc;
  border-radius:6px;
}

#saveBtn{
  height:42px;
  padding:0 18px;
  background:#1f7a63;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

#saveBtn:hover{
  background:#17614f;
}

#msg{
  font-size:12px;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="row">
  <iframe id="NedarimFrame" src="about:blank" scrolling="no"></iframe>
  <button id="saveBtn">שמור</button>
</div>

<div id="msg"></div>

<script>

console.log("URL:", window.location.href);
console.log("QUERY:", window.location.search);

const params = new URLSearchParams(window.location.search);
const donor_id = params.get("donor_id");

const MOSAD = "7006117";
const API_VALID = "/M98yhlNW0";
const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

const iframe = document.getElementById("NedarimFrame");
const saveBtn = document.getElementById("saveBtn");
const msg = document.getElementById("msg");

function sendParentHeight(){
  window.parent.postMessage({
    type:"resize_widget",
    height:60
  },"*");
}

window.onload = function(){

  sendParentHeight();

  window.addEventListener("message", readPostMessage,false);

  iframe.onload = function(){
    postToFrame({Name:"GetHeight"});
  };

  iframe.src="https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide";
};

function postToFrame(data){
  iframe.contentWindow.postMessage(data,"*");
}

function readPostMessage(event){

  if(!event.data || !event.data.Name) return;

  if(event.data.Name==="Height"){
    iframe.style.height=(parseInt(event.data.Value)+5)+"px";
  }

  if(event.data.Name==="TransactionResponse"){

    const response = event.data.Value;

    if(response.Status==="Error"){
      msg.innerText=response.Message;
      saveBtn.disabled=false;
      return;
    }

    const token = response.Token;

    fetch(MAKE_WEBHOOK,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        donor_id:donor_id,
        token:token,
        response:response
      })
    });

    msg.innerText="נשמר בהצלחה";
  }
}

saveBtn.onclick=function(){

  saveBtn.disabled=true;
  msg.innerText="שומר...";

  postToFrame({
    Name:"FinishTransaction2",
    Value:{
      Mosad:MOSAD,
      ApiValid:API_VALID,
      PaymentType:"CreateToken",
      Currency:"1",
      FirstName:"",
      LastName:"",
      Street:"",
      City:"",
      Phone:"",
      Mail:"",
      Amount:"1",
      Tashlumim:"1",
      Comment:"Create token",
      Tokef:""
    }
  });

};

</script>

</body>
</html>
