<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>שמירת כרטיס</title>

<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

iframe{
width:100%;
height:0;
border:1px solid #c44;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
font-size:16px;
background:#0ea5a4;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>הזינו מספר אשראי</h2>

<iframe id="NedarimFrame" src="about:blank" scrolling="no"></iframe>

<button onclick="sendPayment()">שמירת כרטיס</button>

<script>

const MOSAD = "7006117";
const API_VALID = "/M98yhlNWO";
const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

const iframe = document.getElementById("NedarimFrame");

window.onload = function(){

window.addEventListener("message", receiveMessage,false);

iframe.onload = function(){
postToFrame({Name:"GetHeight"});
};

iframe.src="https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide";
};

function postToFrame(data){
iframe.contentWindow.postMessage(data,"*");
}

function receiveMessage(event){

const data=event.data;

if(!data || !data.Name) return;

if(data.Name==="Height"){
iframe.style.height=(parseInt(data.Value)+15)+"px";
}

if(data.Name==="TransactionResponse"){

const res=data.Value;

if(res.Status==="Error"){
alert(res.Message);
return;
}

const token =
res.Token ||
res.CardToken ||
res.CreditToken ||
res.TransactionToken;

fetch(MAKE_WEBHOOK,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
token:token,
response:res
})
});

alert("הטוקן נשמר בהצלחה");

}

}

function sendPayment(){

postToFrame({
Name:"FinishTransaction2",
Value:{
Mosad:MOSAD,
ApiValid:API_VALID,
PaymentType:"CreateToken",
Currency:"1",

Amount:"1",
Tashlumim:"1",

Comment:"Token creation",

Param1:"",
Param2:"",

ForceUpdateMatching:"1",

Tokef:""
}
});

}

</script>

</body>
</html>
