<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compact Payment Strip</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: Arial, sans-serif; overflow: hidden; }
    
    .container {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px;
    }

    iframe {
      flex-grow: 1;
      height: 45px;
      border: 0;
      background: transparent;
    }

    button {
      white-space: nowrap;
      padding: 10px 20px;
      font-size: 14px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: #0f766e;
      color: white;
      font-weight: bold;
      height: 45px;
    }

    button:disabled { background: #ccc; }

    /* הסמלים החדשים בשורה */
    .security-icons {
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.6;
    }

    .security-icons img {
      height: 22px;
      width: auto;
    }

    .status-msg {
      position: absolute;
      bottom: 0;
      right: 10px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe id="NedarimFrame" src="about:blank" scrolling="no"></iframe>
    
    <button id="saveBtn" type="button">שמור</button>

    <div class="security-icons">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/pci.png" alt="PCI">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/shield.png" alt="Secure">
    </div>
  </div>

  <div id="msg" class="status-msg"></div>

<script>
const MOSAD = "7006117";
const API_VALID = "/M98yhlNWO";
const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

const params = new URLSearchParams(window.location.search);
// שים לב: השארתי donor_id כדי שיתאים להגדרות ה-URL שלך באוריגמי
const donorId = params.get("donor_id") || params.get("origami_id"); 

const iframe = document.getElementById("NedarimFrame");
const saveBtn = document.getElementById("saveBtn");
const msg = document.getElementById("msg");

function setMsg(text) {
  msg.textContent = text || "";
}

function postToFrame(data) {
  iframe.contentWindow.postMessage(data, "*");
}

window.onload = function () {
  window.addEventListener("message", receiveMessage, false);

  iframe.onload = function () {
    postToFrame({ Name: "GetHeight" });
  };

  // הכתובת המקורית שלך
  iframe.src = "https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide";
  
  // פקודה לאוריגמי להתאים גובה (חשוב!)
  setTimeout(() => {
    window.parent.postMessage({ type: "resize_widget", height: 65 }, "*");
  }, 500);
};

async function receiveMessage(event) {
  const data = event.data;
  if (!data || !data.Name) return;

  if (data.Name === "Height") {
    const h = parseInt(data.Value, 10);
    if (!isNaN(h) && h > 40) {
      iframe.style.height = (h + 5) + "px";
    }
    return;
  }

  if (data.Name === "TransactionResponse") {
    try {
      const res = data.Value;
      if (res.Status === "Error") {
        setMsg(res.Message || "שגיאה");
        saveBtn.disabled = false;
        return;
      }

      const token = res.Token || res.CardToken || res.CreditToken || res.TransactionToken || "";

      if (!token) {
        setMsg("לא נמצא טוקן");
        saveBtn.disabled = false;
        return;
      }

      const makeResponse = await fetch(MAKE_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          donor_id: donorId,
          token: token,
          response: res
        })
      });

      if (!makeResponse.ok) throw new Error("Make failed");
      setMsg("נשלח בהצלחה");
    } catch (err) {
      setMsg("השליחה נכשלה");
    } finally {
      saveBtn.disabled = false;
    }
  }
}

function sendPayment() {
  setMsg("מעבד...");
  saveBtn.disabled = true;

  postToFrame({
    Name: "FinishTransaction2",
    Value: {
      Mosad: MOSAD,
      ApiValid: API_VALID,
      PaymentType: "CreateToken",
      Currency: "1",
      Amount: "1",
      Tashlumim: "1",
      Comment: "Create token",
      ForceUpdateMatching: "1",
      Tokef: ""
    }
  });
}

saveBtn.addEventListener("click", sendPayment);
</script>
</body>
</html>
