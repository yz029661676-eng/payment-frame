<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Strip</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: Arial, sans-serif; overflow: hidden; }
    
    .container {
      display: flex;
      flex-direction: row; /* שדה בימין, כפתור וסמלים משמאל */
      align-items: center;
      gap: 8px;
      padding: 5px;
      height: 60px;
      box-sizing: border-box;
      width: 100%;
    }

    iframe {
      flex: 1; /* לוקח את כל הרוחב המקסימלי האפשרי */
      height: 45px !important;
      border: 1px solid #ccc;
      border-radius: 4px;
      min-width: 0; /* מאפשר לו להיות גמיש באמת */
    }

    button {
      height: 42px;
      padding: 0 15px;
      font-size: 15px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: #0f766e;
      color: white;
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0; /* הכפתור לא יתכווץ לעולם */
    }

    button:disabled { background: #ccc; }

    .security-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0; /* הסמלים לא יתכווצו */
    }

    .security-icons img {
      height: 18px; /* סמלים קטנים עוד יותר כדי לפנות מקום */
      width: auto;
      display: block;
    }

    #msg {
      position: absolute;
      bottom: 2px;
      right: 15px;
      font-size: 11px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe id="NedarimFrame" src="about:blank" scrolling="no"></iframe>

    <button id="saveBtn" type="button">שמור</button>

    <div class="security-icons">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/shield.png">
      <img src="https://www.matara.pro/nedarimplus/iframe/images/pci.png">
    </div>
  </div>

  <div id="msg"></div>

<script>
const MOSAD = "7006117";
const API_VALID = "/M98yhlNWO";
const MAKE_WEBHOOK = "https://hook.eu2.make.com/u49pybbibi66ce09vhws54n5j6wsc4c4";

const params = new URLSearchParams(window.location.search);
const donorId = params.get("donor_id") || params.get("origami_id");

const iframe = document.getElementById("NedarimFrame");
const saveBtn = document.getElementById("saveBtn");
const msg = document.getElementById("msg");

function setMsg(text, color = "#666") {
  msg.textContent = text || "";
  msg.style.color = color;
}

function postToFrame(data) {
  iframe.contentWindow.postMessage(data, "*");
}

window.onload = function () {
  window.addEventListener("message", receiveMessage, false);
  iframe.onload = function () { postToFrame({ Name: "GetHeight" }); };
  iframe.src = "https://www.matara.pro/nedarimplus/iframe?language=he&Tokef=Hide&CVV=Hide";
  
  setTimeout(() => {
    window.parent.postMessage({ type: "resize_widget", height: 70 }, "*");
  }, 500);
};

async function receiveMessage(event) {
  const data = event.data;
  if (!data || !data.Name) return;
  if (data.Name === "TransactionResponse") {
    try {
      const res = data.Value;
      if (res.Status === "Error") {
        setMsg(res.Message || "שגיאה", "red");
        saveBtn.disabled = false;
        return;
      }
      const token = res.Token || res.CardToken || "";
      const makeResponse = await fetch(MAKE_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ donor_id: donorId, token: token, response: res })
      });
      if (!makeResponse.ok) throw new Error("Make failed");
      setMsg("✅ נשמר", "green");
    } catch (err) {
      setMsg("❌ נכשל", "red");
    } finally {
      saveBtn.disabled = false;
    }
  }
}

function sendPayment() {
  setMsg("⌛...", "#0f766e");
  saveBtn.disabled = true;
  postToFrame({
    Name: "FinishTransaction2",
    Value: {
      Mosad: MOSAD, ApiValid: API_VALID, PaymentType: "CreateToken",
      Currency: "1", Amount: "1", Tashlumim: "1", ForceUpdateMatching: "1"
    }
  });
}

saveBtn.addEventListener("click", sendPayment);
</script>
</body>
</html>
